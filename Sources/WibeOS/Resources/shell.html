<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>wibeOS</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; overflow: hidden;
               font-family: -apple-system, system-ui, sans-serif;
               -webkit-user-select: none; user-select: none; }

  /* ---------- Desktop ---------- */
  #desktop { position: fixed; inset: 0;
    background:
      radial-gradient(1200px 800px at 70% 20%, #7b6cd9 0%, transparent 60%),
      radial-gradient(1000px 700px at 20% 80%, #d96cb0 0%, transparent 55%),
      linear-gradient(160deg, #1b1f3a 0%, #3a2a5d 45%, #16203c 100%); }

  /* ---------- Menu bar ---------- */
  #menubar { position: fixed; top: 0; left: 0; right: 0; height: 26px; z-index: 1000;
    display: flex; align-items: center; padding: 0 12px; gap: 2px;
    background: rgba(28,28,34,.55); backdrop-filter: blur(22px);
    color: #fff; font-size: 13px; }
  .mitem { padding: 2px 10px; border-radius: 5px; cursor: default; white-space: nowrap; }
  .mitem.bold { font-weight: 700; }
  .mitem.open, .mitem:active { background: rgba(255,255,255,.22); }
  #mright { margin-left: auto; display: flex; align-items: center; gap: 14px; font-size: 12.5px; }
  #dropdown { position: fixed; z-index: 1001; min-width: 200px; padding: 5px;
    background: rgba(38,38,44,.92); backdrop-filter: blur(22px);
    border: 1px solid rgba(255,255,255,.14); border-radius: 8px;
    box-shadow: 0 14px 40px rgba(0,0,0,.45); color: #fff; font-size: 13px; }
  #dropdown[hidden] { display: none; }
  .ditem { padding: 4px 10px; border-radius: 5px; display: flex; justify-content: space-between; gap: 24px; }
  .ditem:hover { background: #2f6fed; }
  .ditem .key { color: rgba(255,255,255,.5); }
  .dsep { height: 1px; background: rgba(255,255,255,.15); margin: 5px 8px; }

  /* ---------- Windows ---------- */
  .win { position: absolute; min-width: 260px; min-height: 160px;
    background: #f2f2f4; border-radius: 11px; overflow: hidden;
    box-shadow: 0 22px 70px rgba(0,0,0,.5), 0 0 0 .5px rgba(255,255,255,.25);
    display: flex; flex-direction: column; }
  .win.front { box-shadow: 0 30px 90px rgba(0,0,0,.62), 0 0 0 .5px rgba(255,255,255,.35); }
  .tbar { height: 30px; flex: 0 0 30px; display: flex; align-items: center;
    background: linear-gradient(#e8e8ea, #dcdcdf); border-bottom: 1px solid #c8c8cc;
    cursor: default; position: relative; }
  .win:not(.front) .tbar { background: #ececee; }
  .lights { display: flex; gap: 8px; padding: 0 10px; }
  .lt { width: 12px; height: 12px; border-radius: 50%; border: .5px solid rgba(0,0,0,.15); }
  .lt.red { background: #ff5f57; } .lt.yel { background: #febc2e; } .lt.grn { background: #28c840; }
  .win:not(.front) .lt { background: #d0d0d3; }
  .lt:hover { filter: brightness(.85); }
  .ttitle { position: absolute; left: 0; right: 0; text-align: center; font-size: 13px;
    font-weight: 600; color: #4a4a4f; pointer-events: none; }
  .wbody { flex: 1; position: relative; background: #fff; }
  .wbody iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; background: #fff; }
  .rsz { position: absolute; right: 0; bottom: 0; width: 16px; height: 16px; cursor: nwse-resize; z-index: 5; }
  body.dragging iframe { pointer-events: none; }
  .win.mini { display: none; }

  /* live "materializing" preview: partial app HTML rendered as it streams */
  .preview { position: absolute; inset: 0; overflow: hidden; background: #fff;
    pointer-events: none; display: none; z-index: 3; }
  .win.generating .preview { display: block; }
  .win.generating iframe { visibility: hidden; }
  .genpill { position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
    background: rgba(30,30,36,.85); color: #fff; font-size: 12px; padding: 5px 14px;
    border-radius: 20px; z-index: 7; display: none; white-space: nowrap;
    animation: pulse 1.2s ease-in-out infinite; }
  .win.generating .genpill { display: block; }
  .glitch { position: absolute; top: 8px; right: 10px; z-index: 8; display: none;
    background: rgba(185,120,20,.94); color: #fff; font-size: 11px; padding: 4px 11px;
    border-radius: 14px; cursor: pointer; box-shadow: 0 4px 14px rgba(0,0,0,.3); }
  .glitch:hover { filter: brightness(1.12); }
  .win.glitched .glitch { display: block; }

  /* regen veil */
  .veil { position: absolute; inset: 0; display: none; align-items: center; justify-content: center;
    background: rgba(250,250,252,.45); backdrop-filter: blur(2px); z-index: 4; }
  .win.updating .veil { display: flex; }
  .vsp { background: rgba(30,30,36,.85); color: #fff; font-size: 13px; padding: 8px 16px;
    border-radius: 20px; animation: pulse 1.2s ease-in-out infinite; }
  @keyframes pulse { 50% { opacity: .55; } }

  /* error */
  .werr { position: absolute; inset: 0; display: none; flex-direction: column; gap: 10px;
    align-items: center; justify-content: center; background: #1a1b20; color: #eee;
    font-size: 13px; z-index: 6; padding: 20px; text-align: center; }
  .win.failed .werr { display: flex; }
  .werr button { background: #2f6fed; color: #fff; border: 0; border-radius: 6px;
    padding: 6px 18px; font-size: 13px; cursor: pointer; }

  /* ---------- Dock ---------- */
  #dockwrap { position: fixed; bottom: 8px; left: 0; right: 0; display: flex;
    justify-content: center; z-index: 1000; pointer-events: none; }
  #dock { display: flex; align-items: flex-end; gap: 4px; padding: 6px 10px;
    background: rgba(255,255,255,.22); backdrop-filter: blur(24px);
    border: 1px solid rgba(255,255,255,.25); border-radius: 20px; pointer-events: auto; }
  .dicon { font-size: 38px; line-height: 1; padding: 2px 4px; position: relative;
    cursor: default; transition: transform .12s ease; transform-origin: bottom center; }
  .dicon:hover { transform: scale(1.28) translateY(-6px); }
  .dicon:active { filter: brightness(.8); }
  .dicon .dot { position: absolute; bottom: -4px; left: 50%; transform: translateX(-50%);
    width: 4px; height: 4px; border-radius: 50%; background: rgba(255,255,255,.95); display: none; }
  .dicon.running .dot { display: block; }
  .dicon .tip { position: absolute; bottom: 56px; left: 50%; transform: translateX(-50%);
    background: rgba(40,40,46,.92); color: #fff; font-size: 12px; padding: 3px 10px;
    border-radius: 6px; white-space: nowrap; display: none; }
  .dicon:hover .tip { display: block; }
  .dsepv { width: 1px; align-self: stretch; background: rgba(255,255,255,.3); margin: 4px 5px; }

  /* ---------- System dialogs ---------- */
  .sysdlg { position: fixed; inset: 0; z-index: 2000; display: flex;
    align-items: center; justify-content: center; background: rgba(0,0,0,.25); }
  .sysdlg[hidden] { display: none; }
  .dlgbox { background: rgba(244,244,246,.97); border-radius: 13px; padding: 26px 30px;
    width: 380px; text-align: center; box-shadow: 0 26px 80px rgba(0,0,0,.5);
    font-size: 13px; color: #333; }
  .dlgbox h2 { font-size: 16px; margin: 8px 0 4px; }
  .dlgbox p { color: #777; margin: 4px 0 14px; }
  .dlgbox input { width: 100%; padding: 7px 10px; font-size: 13px; border: 1px solid #ccc;
    border-radius: 7px; margin-bottom: 14px; -webkit-user-select: text; user-select: text; }
  .dlgbox button { background: #2f6fed; color: #fff; border: 0; border-radius: 7px;
    padding: 7px 20px; font-size: 13px; cursor: pointer; margin: 0 4px; }
  .dlgbox button.alt { background: #e3e3e6; color: #333; }

  #sleepveil { position: fixed; inset: 0; background: #000; z-index: 3000; }
  #sleepveil[hidden] { display: none; }

  /* ---------- Boot ---------- */
  #boot { position: fixed; inset: 0; background: #000; z-index: 5000; color: #fff;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 26px; transition: opacity .8s; }
  #boot.hidden { opacity: 0; pointer-events: none; }
  #blogo { font-size: 84px; }
  #bbar { width: 230px; height: 5px; background: #2a2a2a; border-radius: 3px; overflow: hidden; }
  #bfill { height: 100%; width: 2%; background: #fff; border-radius: 3px; transition: width 1.1s ease; }
  #btag { font-size: 13px; color: #888; }
</style>

        '<div class="veil"><div class="vsp">✨ re-imagining…</div></div>' +
        '<div class="werr"><div style="font-size:34px">💥</div><div>vibes interrupted</div>' +
          '<div class="werrmsg" style="color:#999;font-size:11px;max-width:90%"></div>' +
          '<button data-act="retry">Try Again</button></div>' +
      '</div>' +
      '<div class="rsz"></div>';
    winsEl.appendChild(el);

    var w = {
      id: id, app: app, icon: icon, el: el,
      iframe: el.querySelector("iframe"),
      previewEl: el.querySelector(".preview"),
      errMsgEl: el.querySelector(".werrmsg"),
      history: [], buf: "", raf: null, zoomed: null
    };
    state.wins[id] = w;

    el.addEventListener("mousedown", function () { bringFront(w); }, true);
    el.querySelector(".tbar").addEventListener("mousedown", function (e) {
      if (e.target.classList.contains("lt")) return;
      startDrag(w, e, "move");
    });
    el.querySelector(".rsz").addEventListener("mousedown", function (e) { startDrag(w, e, "size"); });
    el.querySelectorAll(".lt").forEach(function (lt) {
      lt.addEventListener("click", function (e) {
        e.stopPropagation();
        var act = lt.getAttribute("data-act");
        if (act === "close") closeWin(w);
        if (act === "min") minimize(w);
        if (act === "zoom") zoom(w);
      });
    });
    el.querySelector(".glitch").addEventListener("click", function (e) {
      e.stopPropagation();
      regen(w);
    });
    el.querySelector('[data-act="retry"]').addEventListener("click", function () {
      el.classList.remove("failed");
      if (w.history.length && w.history[w.history.length - 1].role === "user") {
        el.classList.add("updating");   // failed update: resend it
        sendGen(w);
      } else {
        startCreate(w);                 // failed creation: try again
      }
    });

    bringFront(w);
    refreshDock();
    return w;
  }

  function bringFront(w) {
    if (state.frontId === w.id) return;
    state.frontId = w.id;
    w.el.style.zIndex = ++state.z;
    Object.values(state.wins).forEach(function (x) {
      x.el.classList.toggle("front", x.id === w.id);
    });
    $("mAppName").textContent = w.app;
  }

  function closeWin(w) {
    var p = findGen(w.app);
    if (p && p.win === w) p.win = null; // generation continues into the cache
    delete state.wins[w.id];
    w.el.remove();
    if (state.frontId === w.id) {
      state.frontId = null;
      var rest = Object.values(state.wins).filter(function (x) { return !x.el.classList.contains("mini"); });
      if (rest.length) bringFront(rest[rest.length - 1]);
      else $("mAppName").textContent = "Finder";
    }
    refreshDock();
  }

  function minimize(w) {
    w.el.classList.add("mini");
    if (state.frontId === w.id) state.frontId = null;
    refreshDock();
  }

  function restore(w) {
    w.el.classList.remove("mini");
    bringFront(w);
  }

  function zoom(w) {
    if (w.zoomed) {
      w.el.style.left = w.zoomed.l; w.el.style.top = w.zoomed.t;
      w.el.style.width = w.zoomed.w; w.el.style.height = w.zoomed.h;
      w.zoomed = null;
    } else {
      w.zoomed = { l: w.el.style.left, t: w.el.style.top, w: w.el.style.width, h: w.el.style.height };
      w.el.style.left = "6px"; w.el.style.top = "32px";
      w.el.style.width = (window.innerWidth - 12) + "px";
      w.el.style.height = (window.innerHeight - 110) + "px";
    }
  }

  function startDrag(w, e, mode) {
    e.preventDefault();
    bringFront(w);
    document.body.classList.add("dragging");
    var sx = e.clientX, sy = e.clientY;
    var r = w.el.getBoundingClientRect();
    function mm(ev) {
      var dx = ev.clientX - sx, dy = ev.clientY - sy;
      if (mode === "move") {
        w.el.style.left = Math.max(-r.width + 80, r.left + dx) + "px";
        w.el.style.top = Math.max(26, r.top + dy) + "px";
      } else {
        w.el.style.width = Math.max(260, r.width + dx) + "px";
        w.el.style.height = Math.max(160, r.height + dy) + "px";
      }
    }
    function mu() {
      document.body.classList.remove("dragging");
      document.removeEventListener("mousemove", mm);
      document.removeEventListener("mouseup", mu);
    }
    document.addEventListener("mousemove", mm);
    document.addEventListener("mouseup", mu);
  }

  /* ============ app lifecycle ============ */
  function createMsg(app, hint) {
    return {
      role: "user",
      content: JSON.stringify({
        task: "create-app", app: app, hint: hint || "",
        user: window.WIBE_USER || "user", time: new Date().toString()
      })
    };
  }

  function findGen(app) {
    var ids = Object.keys(state.gen);
    for (var i = 0; i < ids.length; i++) {
      if (state.gen[ids[i]].app === app) return state.gen[ids[i]];
    }
    return null;
  }

  function startCreate(w) {
    var p = findGen(w.app);
    if (!p) {
      p = { id: "g" + (state.nextId++), app: w.app, buf: "", win: null, raf: null,
            history: [createMsg(w.app, w.hint)] };
      state.gen[p.id] = p;
      post({ id: p.id, messages: p.history });
    }
    p.win = w;
    w.el.classList.add("generating");
    if (p.buf) w.previewEl.innerHTML = previewHtml(p.buf);
  }

  /* background prefetch of dock apps, 2 generations at a time */
  var pfQueue = [];
  function prefetchAll() {
    if (window.WIBE_PREFETCH === false) return;
    APPS.forEach(function (a) {
      if (!state.cache[a.name] && !findGen(a.name)) pfQueue.push(a);
    });
    pump();
    pump();
    pump();
  }
  function pump() {
    if (Object.keys(state.gen).length >= 3) return;
    var a = pfQueue.shift();
    if (!a) return;
    if (state.cache[a.name] || findGen(a.name)) { pump(); return; }
    var p = { id: "g" + (state.nextId++), app: a.name, buf: "", win: null, raf: null,
              history: [createMsg(a.name, a.hint)] };
    state.gen[p.id] = p;
    post({ id: p.id, messages: p.history });
  }

  function openApp(app, icon, hint, force) {
    var existing = Object.values(state.wins).find(function (w) { return w.app === app; });
    if (existing) {
      if (force) { existing.hint = hint || existing.hint; regen(existing); }
      else if (existing.el.classList.contains("mini")) restore(existing);
      else bringFront(existing);
      return;
    }
    var spec = APPS.find(function (a) { return a.name === app; }) || {};
    var w = createWindow(app, icon || spec.icon || "✨", { w: spec.w, h: spec.h });
    w.hint = hint || spec.hint || "";
    if (force) {
      delete state.cache[app];
      post({ control: "delcache", app: app });
      var p = findGen(app);
      if (p) { p.win = null; delete state.gen[p.id]; }
    }
    var cached = state.cache[app];
    if (cached) {
      w.history = (cached.history || []).slice();
      w.iframe.srcdoc = withBridge(cached.doc);   // instant, with the CURRENT bridge
      return;
    }
    startCreate(w);
  }

  function updateApp(w, detail) {
    if (w.el.classList.contains("generating") || w.el.classList.contains("updating")) return;
    if (w.history.length && w.history[w.history.length - 1].role === "user") w.history.pop();
    detail.time = new Date().toString();
    w.history.push({ role: "user", content: JSON.stringify({ task: "update-app", event: detail }) });
    trimHistory(w);
    w.el.classList.add("updating");
    sendGen(w);
  }

  function regen(w) {
    delete state.cache[w.app];
    post({ control: "delcache", app: w.app });
    var p = findGen(w.app);
    if (p) { p.win = null; delete state.gen[p.id]; }
    w.history = [];
    w.iframe.srcdoc = "";
    w.previewEl.innerHTML = "";
    w.el.classList.remove("updating", "failed", "glitched");
    startCreate(w);
  }

  /* messages from app iframes */
  window.addEventListener("message", function (e) {
    var d = e.data || {};
    var w = Object.values(state.wins).find(function (x) {
      return x.iframe && x.iframe.contentWindow === e.source;
    });
    if (d.wibe === "event" && w) updateApp(w, d.detail);
    else if (d.wibe === "open") openApp(String(d.app).slice(0, 60), "✨",
      "An app requested by another app: " + String(d.app) + ". " + String(d.hint || ""));
    else if (d.wibe === "focus" && w) bringFront(w);
    else if (d.wibe === "jserror" && w) {
      w.el.classList.add("glitched");
      w.el.querySelector(".glitch").title = d.message || "";
    }
  });

  /* ============ dock ============ */
  function refreshDock() {
    var dock = $("dock");
    dock.innerHTML = "";
    APPS.forEach(function (a) { dock.appendChild(dockIcon(a.name, a.icon)); });
    // imagined apps currently open or cached
    var extras = {};
    Object.values(state.wins).forEach(function (w) {
      if (!APPS.find(function (a) { return a.name === w.app; })) extras[w.app] = w.icon;
    });
    var names = Object.keys(extras);
    if (names.length) {
      var sep = document.createElement("div"); sep.className = "dsepv"; dock.appendChild(sep);
      names.forEach(function (n) { dock.appendChild(dockIcon(n, extras[n])); });
    }
    var sep2 = document.createElement("div"); sep2.className = "dsepv"; dock.appendChild(sep2);
    var im = document.createElement("div");
    im.className = "dicon";
    im.innerHTML = "✨<span class='tip'>Imagine…</span><span class='dot'></span>";
    im.addEventListener("click", showImagine);
    dock.appendChild(im);
  }

  function dockIcon(name, icon) {
    var d = document.createElement("div");
    d.className = "dicon";
    d.innerHTML = esc(icon) + "<span class='tip'>" + esc(name) +
      "</span><span class='dot'></span>";
    var open = Object.values(state.wins).some(function (w) { return w.app === name; });
    if (open) d.classList.add("running");
    d.addEventListener("click", function (e) {
      var spec = APPS.find(function (a) { return a.name === name; });
      openApp(name, icon, spec && spec.hint, e.altKey); // Option-click forces re-imagine
    });
    return d;
  }

  /* ============ menu bar ============ */
  var dropdown = $("dropdown");
  var openMenu = null;

  function front() { return state.wins[state.frontId] || null; }

  function menuItems(name) {
    var f = front();
    var appName = f ? f.app : "Finder";
    if (name === "apple") return [
      { l: "About This wibe…", f: function () { $("aboutDlg").hidden = false; } },
      { sep: 1 },
      { l: "Sleep", f: function () { $("sleepveil").hidden = false; } },
      { l: "Reboot wibeOS", f: function () { location.reload(); } },
      { sep: 1 },
      { l: "Quit wibeOS", k: "⌘Q", f: function () { post({ control: "quit" }); } }
    ];
    if (name === "app") return [
      { l: "About " + appName, m: "App>About" },
      { sep: 1 },
      { l: "Close Window", k: "⌘W", f: function () { if (f) closeWin(f); } }
    ];
    if (name === "File") return [
      { l: "New", m: "File>New" }, { l: "Open…", m: "File>Open" }, { l: "Save", m: "File>Save" }
    ];
    if (name === "Edit") return [
      { l: "Undo", m: "Edit>Undo" }, { sep: 1 },
      { l: "Cut", m: "Edit>Cut" }, { l: "Copy", m: "Edit>Copy" }, { l: "Paste", m: "Edit>Paste" },
      { l: "Select All", m: "Edit>SelectAll" }
    ];
    if (name === "View") return [
      { l: "Re-imagine " + appName, f: function () { if (f) regen(f); } }
    ];
    if (name === "Window") {
      var items = [
        { l: "Minimize", f: function () { if (f) minimize(f); } },
        { l: "Zoom", f: function () { if (f) zoom(f); } }
      ];
      var ws = Object.values(state.wins);
      if (ws.length) {
        items.push({ sep: 1 });
        ws.forEach(function (w) {
          items.push({ l: (w.id === state.frontId ? "✓ " : "   ") + w.icon + " " + w.app,
                       f: function () { restore(w); } });
        });
      }
      return items;
    }
    if (name === "Help") return [{ l: appName + " Help", m: "Help>Help" }];
    return [];
  }

  function showDropdown(mitem) {
    var name = mitem.getAttribute("data-menu");
    var items = menuItems(name);
    dropdown.innerHTML = "";
    items.forEach(function (it) {
      if (it.sep) {
        var s = document.createElement("div"); s.className = "dsep"; dropdown.appendChild(s);
        return;
      }
      var d = document.createElement("div");
      d.className = "ditem";
      d.innerHTML = "<span>" + esc(it.l) + "</span>" + (it.k ? "<span class='key'>" + it.k + "</span>" : "");
      d.addEventListener("click", function (e) {
        e.stopPropagation();
        hideDropdown();
        if (it.f) it.f();
        else if (it.m) {
          var f = front();
          if (f && f.iframe.contentWindow) f.iframe.contentWindow.postMessage({ wibe: "menu", item: it.m }, "*");
        }
      });
      dropdown.appendChild(d);
    });
    var r = mitem.getBoundingClientRect();
    dropdown.style.left = r.left + "px";
    dropdown.style.top = "27px";
    dropdown.hidden = false;
    document.querySelectorAll(".mitem").forEach(function (m) { m.classList.remove("open"); });
    mitem.classList.add("open");
    openMenu = mitem;
  }

  function hideDropdown() {
    dropdown.hidden = true;
    if (openMenu) openMenu.classList.remove("open");
    openMenu = null;
  }

  document.querySelectorAll(".mitem").forEach(function (m) {
    m.addEventListener("click", function (e) {
      e.stopPropagation();
      if (openMenu === m) hideDropdown(); else showDropdown(m);
    });
    m.addEventListener("mouseenter", function () { if (openMenu && openMenu !== m) showDropdown(m); });
  });
  document.addEventListener("click", hideDropdown);
  $("sleepveil").addEventListener("click", function () { $("sleepveil").hidden = true; });
  $("aboutOk").addEventListener("click", function () { $("aboutDlg").hidden = true; });

  /* keyboard */
  document.addEventListener("keydown", function (e) {
    if (e.metaKey && e.key === "w") { e.preventDefault(); var f = front(); if (f) closeWin(f); }
  });

  /* ============ imagine dialog ============ */
  function showImagine() {
    $("imagineDlg").hidden = false;
    $("imagineInput").value = "";
    setTimeout(function () { $("imagineInput").focus(); }, 50);
  }
  function conjure() {
    var name = $("imagineInput").value.trim();
    $("imagineDlg").hidden = true;
    if (!name) return;
    openApp(name.slice(0, 60), "✨",
      'An app the user just imagined: "' + name + '". Interpret generously and build something delightful and convincing.');
  }
  $("imagineGo").addEventListener("click", conjure);
  $("imagineCancel").addEventListener("click", function () { $("imagineDlg").hidden = true; });
  $("imagineInput").addEventListener("keydown", function (e) { if (e.key === "Enter") conjure(); });

  /* ============ clock ============ */
  function tick() {
    var d = new Date();
    var days = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
    var mons = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
    var h = d.getHours(), m = d.getMinutes();
    $("clock").textContent = days[d.getDay()] + " " + mons[d.getMonth()] + " " + d.getDate() +
      "  " + h + ":" + (m < 10 ? "0" : "") + m;
  }
  tick();
  setInterval(tick, 5000);

  /* ============ boot ============ */
  window.addEventListener("load", function () {
    refreshDock();
    post({ control: "loadcache" });   // → wibeos.cacheLoaded → prefetchAll
    requestAnimationFrame(function () { $("bfill").style.width = "100%"; });
    setTimeout(function () { $("boot").classList.add("hidden"); }, 1300);
  });
})();
</script>
</body>
